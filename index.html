<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d1b2a" />
  <title>Indie Games</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/shared.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar sticky-top" id="app-navbar">
    <div class="container-lg">
      <span class="navbar-brand">INDIE <span class="text-primary">GAMES</span></span>
      <div id="nav-auth" class="d-flex align-items-center gap-2"></div>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section class="hero-section text-center py-5">
    <div class="container">
      <div class="hero-icon">🎮</div>
      <h1 class="hero-title">INDIE <span class="text-primary">GAMES</span></h1>
      <p class="hero-tagline">Multiplayer party games for friends</p>
    </div>
  </section>

  <!-- ── Stats (signed in) ── -->
  <section id="stats-section" class="stats-section hidden py-4">
    <div class="container-lg">
      <div class="d-flex align-items-center gap-3 mb-4">
        <img id="user-photo" src="" alt="avatar" class="user-stat-avatar" />
        <div>
          <div class="fw-bold" id="user-name-display"></div>
          <small class="text-muted">Your statistics</small>
        </div>
      </div>
      <div class="row g-3" id="stats-overview"></div>
    </div>
  </section>

  <!-- ── Sign-in prompt (not signed in) ── -->
  <section id="signin-prompt" class="hidden py-4">
    <div class="container-lg">
      <div class="signin-prompt-card mx-auto">
        <p class="fw-semibold mb-1">Enter your name to play</p>
        <p class="text-muted small mb-3">No account needed.</p>
        <div class="input-group mb-3">
          <input type="text" id="player-name-input" class="form-control home-input"
            placeholder="Your name" maxlength="30"
            autocomplete="nickname" spellcheck="false" />
          <button class="btn btn-primary" id="play-btn">Play →</button>
        </div>
        <div class="d-flex align-items-center gap-2 mb-3">
          <hr class="flex-grow-1 m-0" style="border-color:var(--border)" />
          <span class="text-muted" style="font-size:11px;white-space:nowrap">or sign in for persistent stats</span>
          <hr class="flex-grow-1 m-0" style="border-color:var(--border)" />
        </div>
        <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" id="signin-btn-main">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" style="width:16px;height:16px" />
          Sign in with Google
        </button>
        <p id="signin-error" class="text-danger small mt-2 mb-0"></p>
      </div>
    </div>
  </section>

  <!-- ── Game Library ── -->
  <main class="py-4">
    <div class="container-lg">
      <h2 class="section-label mb-3">Game Library</h2>
      <div class="row g-3" id="games-grid"></div>
    </div>
  </main>

  <!-- ── Join Room ── -->
  <section class="pb-5">
    <div class="container-lg" style="max-width:560px">
      <h2 class="section-label mb-3">Join a Room</h2>
      <div class="card home-card">
        <div class="card-body">
          <div class="input-group">
            <input type="text" id="join-code" class="form-control home-input"
              placeholder="4-letter room code" maxlength="4"
              autocomplete="off" autocapitalize="characters" spellcheck="false" />
            <button class="btn btn-primary" id="join-btn">Join</button>
          </div>
          <p id="join-error" class="text-danger small mt-2 mb-0"></p>
        </div>
      </div>
    </div>
  </section>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="big-spinner"></div>
    <p id="loading-msg">Loading…</p>
  </div>
  <div id="toast" class="app-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/js/firebase-init.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/room.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
