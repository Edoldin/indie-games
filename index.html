<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d1b2a" />
  <title>Indie Games</title>
  <link rel="stylesheet" href="/css/shared.css" />
</head>
<body>
  <main class="home-page">
    <div class="home-logo">
      <span class="home-icon">🎮</span>
      <h1>INDIE <span class="accent">GAMES</span></h1>
      <p class="tagline">Multiplayer party games for friends</p>
    </div>

    <!-- Not signed in -->
    <div id="signin-section" class="signin-card hidden">
      <p>Sign in to create or join a game room.</p>
      <button class="btn btn-google btn-full" id="signin-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>
      <p id="signin-error" class="error-msg"></p>
    </div>

    <!-- Signed in -->
    <div id="play-section" class="hidden" style="width:100%;max-width:720px;display:flex;flex-direction:column;gap:20px">

      <div class="user-bar">
        <img id="user-photo" src="" alt="avatar" />
        <span>Welcome, <strong id="user-name"></strong></span>
        <button class="btn btn-ghost btn-sm" id="signout-btn" style="margin-left:auto">Sign out</button>
      </div>

      <!-- Game cards — rendered by home.js from GAME_CONFIGS -->
      <div id="games-grid" class="games-grid"></div>

      <!-- Join any room -->
      <div class="join-card">
        <h3>Join a Room</h3>
        <div class="join-row-input">
          <input
            type="text" id="join-code" class="input"
            placeholder="4-letter room code"
            maxlength="4" autocomplete="off" autocapitalize="characters" spellcheck="false"
            style="flex:1"
          />
          <button class="btn btn-ghost" id="join-btn">Join</button>
        </div>
        <p id="join-error" class="error-msg"></p>
      </div>
    </div>
  </main>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="big-spinner"></div>
    <p id="loading-msg">Loading…</p>
  </div>
  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/js/firebase-init.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/room.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
